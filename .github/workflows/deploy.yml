name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        run: |
          if [ -f static/CNAME ] && [ -s static/CNAME ] && ! grep -q "domain.io" static/CNAME; then
            echo "CNAME file exists and contains a custom domain. Building with empty BASE_PATH."
            BASE_PATH="" npm run build
          else
            echo "No custom CNAME found (or placeholder domain.io is present). Building with BASE_PATH=/${{ github.event.repository.name }}."
            BASE_PATH="/${{ github.event.repository.name }}" npm run build
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
